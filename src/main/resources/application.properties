spring.application.name=helpdesk


#database connection

spring.datasource.url=jdbc:mysql://localhost:3306/spring_ai_helpdesk
spring.datasource.username=root
spring.datasource.password=${MYSQL_PASSWORD}

#jpa setting
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update

# Point Spring AI's OpenAI client to OpenRouter
spring.ai.openai.api-key=${OPENROUTER_API_KEY}git s
spring.ai.openai.base-url=https://openrouter.ai/api
spring.ai.openai.chat.options.model=openrouter/auto
#spring.ai.openai.chat.options.model=deepseek/deepseek-v4-flash:free